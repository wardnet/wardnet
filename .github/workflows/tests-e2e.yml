name: E2E Tests

# Reusable leaf for end-to-end tests.
#
# Stage 6a (PR4) wires up only the daemon scaffolding + a single smoke
# spec — enough to prove the docker-compose harness boots end-to-end on
# a Linux runner. Subsequent PRs (Stage 6b/c) layer in the LAN clients
# (test_alpine, test_ubuntu) and the real scenarios (DHCP, DNS,
# routing, etc.).
#
# Job topology:
#   end2end-tests-daemon — single ubuntu-latest job, builds the test
#                          image (compiles wardnetd from source on top
#                          of wardnet-base), brings up the compose
#                          stack, runs `yarn vitest run` inside the
#                          test_runner container, uploads the JUnit/
#                          JSON reports + compose logs as artefacts.
#
# Triggered indirectly via pr.yml + ci.yml as a workflow_call leaf —
# matches the rest of the build-* / coverage / placeholder pattern in
# the repo.

on:
  workflow_call:

# Explicit scopes (not read-all) so this leaf's workflow-level stays a
# subset of the caller's workflow-level — GitHub's reusable-workflow
# permission rules reject leaf > caller.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  end2end-tests-daemon:
    name: E2E Daemon Tests
    runs-on: ubuntu-latest
    # Generous ceiling: image-test rebuilds wardnetd + wardnet-test-agent
    # from scratch inside Docker (~7-10 min on a cold runner). A future
    # optimisation will pre-feed the prebuilt binaries via a
    # PREBUILT_BIN_DIR build arg, at which point this drops to ~3 min.
    timeout-minutes: 40
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # `make image-test` builds the web UI as a prerequisite (the
      # daemon embeds source/web-ui/dist via rust-embed). Caching the
      # web-ui yarn install is the biggest single win here; the e2e
      # test_runner package's deps install inside Docker and are
      # cached by the Docker layer cache instead.
      - uses: ./.github/actions/setup-node-yarn
        with:
          cache-dependency-path: source/web-ui/yarn.lock

      - uses: ./.github/actions/setup-rust

      - name: Run daemon e2e suite
        # `make end2end-daemon` chains: build-web → image-test (cargo
        # build inside Docker) → compose up --wait wardnetd → vitest in
        # test_runner → trap dumps compose logs into reports/ and
        # tears the stack down. Reports are written even on failure.
        #
        # CONTAINER_RT=docker forces Docker's BuildKit instead of the
        # Makefile's default podman-first auto-detection. ubuntu-latest
        # ships both binaries; podman's classic image builder rejects
        # the BuildKit heredoc syntax used in source/daemon/Dockerfile.test
        # ("Unknown instruction: SET"). Docker BuildKit honours the
        # `# syntax=docker/dockerfile:1` directive and parses heredocs
        # cleanly. Local devs on macOS keep the podman default.
        run: make end2end-daemon CONTAINER_RT=$(command -v docker)

      - name: Surface captured logs
        # Print the trap-captured compose logs + JUnit/JSON reports
        # inline so a reviewer can diagnose a failure straight from the
        # workflow log without downloading the artefact. Uses
        # `::group::` markers so the output is collapsible in the GHA
        # UI. Runs on success too — confirms logs were captured and
        # surfaces any healthy-but-noisy output worth noticing.
        if: always()
        run: |
          set +e
          REPORTS=source/end2end-tests/daemon/reports
          echo "::group::reports directory listing"
          ls -la "${REPORTS}" 2>&1 || echo "(reports directory missing)"
          echo "::endgroup::"
          for f in compose-logs.txt junit.xml results.json; do
            path="${REPORTS}/${f}"
            if [ -s "${path}" ]; then
              echo "::group::${f}"
              cat "${path}"
              echo "::endgroup::"
            else
              echo "::warning::${path} missing or empty"
            fi
          done

      - name: Upload Vitest reports
        # Always upload, even on failure — the JUnit XML + compose
        # logs the trap captured are the primary debug surface.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: end2end-tests-daemon-reports
          path: source/end2end-tests/daemon/reports/
          retention-days: 7
          if-no-files-found: warn
