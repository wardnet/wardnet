name: CI

on:
  push:
    branches: [main]
    paths:
      - "source/**"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "source/**"
      - "Makefile"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-web:
    name: Check Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: yarn
          cache-dependency-path: source/web-ui/yarn.lock

      - name: Check
        run: make check-web

  check-site:
    name: Check Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: yarn
          cache-dependency-path: source/site/yarn.lock

      - name: Check
        run: make check-site

  build-web:
    name: Build Web
    needs: check-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: yarn
          cache-dependency-path: source/web-ui/yarn.lock

      - name: Build
        run: make build-web

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: web-ui-dist
          path: source/web-ui/dist/
          retention-days: 1

  check-daemon:
    name: Check Daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/daemon

      - name: Check
        run: make check-daemon

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/daemon

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate daemon coverage
        run: |
          mkdir -p coverage
          make coverage-daemon COV_FMT="--lcov --output-path ../../coverage/daemon-lcov.info"

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: yarn
          cache-dependency-path: source/site/yarn.lock

      - name: Generate site coverage
        run: cd source/site && yarn install --immutable && yarn test:coverage

      - name: Collect site coverage
        run: cp source/site/coverage/lcov.info coverage/site-lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: coverage/daemon-lcov.info,coverage/site-lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-daemon:
    name: Build Daemon (${{ matrix.target }})
    needs: [build-web, check-daemon]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
    steps:
      - uses: actions/checkout@v6

      # The web UI was built in the `build-web` job; `rust-embed` picks it up
      # from this directory at daemon compile time. All three matrix entries
      # reuse the single artifact instead of each re-running `yarn build`.
      - name: Download web-ui dist
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: source/web-ui/dist/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/daemon

      - name: Install cross-compilation toolchain
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      # Native targets build the whole workspace; cross-compile jobs build
      # only the daemon crate for the requested target (other crates like
      # wctl and wardnet-test-agent don't need aarch64-linux binaries in CI).
      - name: Build
        env:
          TARGET: ${{ matrix.cross && matrix.target || '' }}
          CRATE: ${{ matrix.cross && 'wardnetd' || '' }}
        run: make build-daemon
