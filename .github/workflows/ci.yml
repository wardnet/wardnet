name: CI

on:
  push:
    branches: [main]
    paths:
      - "source/**"
      - "Makefile"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "source/**"
      - "Makefile"
      - ".github/workflows/ci.yml"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check-web:
    name: Check Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: yarn
          cache-dependency-path: source/web-ui/yarn.lock

      - name: Check
        run: make check-web

  build-web:
    name: Build Web
    needs: check-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: "25"
          cache: yarn
          cache-dependency-path: source/web-ui/yarn.lock

      - name: Build
        run: make build-web

      - name: Upload dist
        uses: actions/upload-artifact@v7
        with:
          name: web-ui-dist
          path: source/web-ui/dist/
          retention-days: 1

  check-daemon:
    name: Check Daemon
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/daemon

      - name: Check
        run: make check-daemon

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/daemon

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: |
          mkdir -p coverage
          cd source/daemon && cargo llvm-cov --workspace --lcov --output-path ../../coverage/lcov.info \
            --ignore-filename-regex '(main\.rs|wireguard_real\.rs|wireguard_noop\.rs|packet_capture_noop\.rs|hostname_resolver_noop\.rs|db\.rs|web\.rs|api/mod\.rs|auth_context\.rs)'

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage/lcov.info
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  build-daemon:
    name: Build Daemon (${{ matrix.target }})
    needs: [build-web, check-daemon]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            make-target: build-daemon
          - target: aarch64-apple-darwin
            runner: macos-latest
            make-target: build-daemon
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            make-target: build-pi
    steps:
      - uses: actions/checkout@v6

      - name: Download web-ui dist
        uses: actions/download-artifact@v8
        with:
          name: web-ui-dist
          path: source/web-ui/dist/

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: source/daemon

      - name: Install cross-compilation toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: make ${{ matrix.make-target }}
