name: Release

# Tag-driven release orchestrator.
#
# Composes the same leaves as ci.yml + pr.yml plus release-specific
# ones. Release does NOT nest pr.yml — pr.yml's preflight gating
# (paths-filter) is meaningless on a tag push, and coverage shouldn't
# run on release (Codecov's patch-coverage is PR-keyed).
#
# `workflow_dispatch` is supported for dry runs on non-tag refs: the
# build + sign paths all run, but `release-daemon` (publish) is gated
# on the ref being a tag so nothing reaches GitHub Releases.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Workflow-level permissions stay read-only. Each leaf elevates to
# the writes it actually needs via its own `permissions:` block —
# Scorecard's Token-Permissions check rewards this scoping. The
# write-scoped permissions per leaf are:
#   - build-daemon  → security-events: write (clippy SARIF upload)
#   - deploy-site   → pages: write, id-token: write (GH Pages publish)
#   - release-daemon → contents: write (`gh release create`)
#   - release-image → packages: write (GHCR push)
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  resolve:
    name: Resolve version and channel
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      prerelease: ${{ steps.version.outputs.prerelease }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Resolve version and classify channel from ref
        id: version
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="${TAG#v}"

            # Verify the VERSION file agrees with the tag. Prevents "tag says
            # v0.2.1 but the binary reports 0.2.0" mismatches.
            FILE_VERSION="$(tr -d '[:space:]' < VERSION)"
            if [[ "${VERSION%%-*}" != "${FILE_VERSION%%-*}" ]]; then
              echo "::error::tag v${VERSION} does not agree with ./VERSION (${FILE_VERSION}). Run 'make sync-version' and re-tag."
              exit 1
            fi
          else
            # workflow_dispatch on a non-tag ref — derive a dev version.
            TAG=""
            VERSION="$(git describe --tags --always --dirty | sed 's/^v//')"
          fi

          # SemVer pre-release suffix → beta channel.
          if [[ "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "prerelease=${PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

          echo "Release version: ${VERSION} (tag=${TAG:-<dispatch>}, prerelease=${PRERELEASE})"

  build-daemon:
    name: Build Daemon
    needs: resolve
    permissions:
      contents: read
      actions: read
      security-events: write
    uses: ./.github/workflows/build-daemon.yml
    secrets: inherit

  build-site:
    name: Build Site
    needs: resolve
    uses: ./.github/workflows/build-site.yml
    secrets: inherit

  tests-e2e:
    name: E2E Tests
    needs: [build-daemon, build-site]
    uses: ./.github/workflows/tests-e2e.yml
    secrets: inherit

  deploy-site:
    name: Deploy Site
    needs: [build-site, tests-e2e]
    # Dry-run (workflow_dispatch on non-tag) still deploys the site —
    # harmless, idempotent, and confirms the Pages path works.
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/deploy-site.yml
    with:
      bundle-artifact: site-dist
    secrets: inherit

  release-daemon:
    name: Release Daemon
    needs: [resolve, build-daemon, tests-e2e]
    # Only publish when triggered by an actual tag push. workflow_dispatch
    # runs exercise the full build + sign path but stop short of the
    # `gh release create` call.
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    uses: ./.github/workflows/release-daemon.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      tag: ${{ needs.resolve.outputs.tag }}
      prerelease: ${{ fromJSON(needs.resolve.outputs.prerelease) }}
    secrets: inherit

  release-image:
    name: Release Image
    # release-image consumes the published release tarball, so it
    # must run AFTER release-daemon — the Dockerfile curls
    # `https://github.com/.../releases/download/v${VERSION}/...`.
    needs: [resolve, release-daemon]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/release-image.yml
    with:
      version: ${{ needs.resolve.outputs.version }}
      prerelease: ${{ fromJSON(needs.resolve.outputs.prerelease) }}
    secrets: inherit
