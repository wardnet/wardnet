name: "Wardnet CodeQL config"

# What gets analysed (implicitly, since `paths:` is not set):
#
#   Rust:
#     - source/daemon/crates/*/src/**   (daemon, data, services, api, mock, cli)
#     - source/daemon/build-support/**
#
#   JavaScript / TypeScript (single `javascript-typescript` language):
#     - source/web-ui/src/**            (React admin UI)
#     - source/sdk/wardnet-js/src/**    (TypeScript SDK)
#     - source/site/src/**              (marketing site)
#     - source/site/scripts/**          (release-manifest generator)
#
#   GitHub Actions:
#     - .github/workflows/**
#     - .github/actions/**
#
# Test code, however, is intentionally excluded below.
#
# Test fixtures intentionally contain patterns CodeQL flags as risky —
# hard-coded passwords (`"admin123"`, `"wrong"`, `"correct"`), canned
# WireGuard keys, dummy session tokens, and so on. These are test
# inputs, not production credentials, and they never leave the repo.
#
# Production code outside these paths is still fully analysed. If a
# future test file is added somewhere not covered here, extend this
# list — don't weaken the queries themselves.
paths-ignore:
  # Rust unit tests (we keep them in `src/<layer>/tests/<module>.rs` per
  # the project convention in CLAUDE.md).
  - "source/daemon/crates/*/src/tests/**"
  - "source/daemon/crates/*/src/**/tests/**"

  # Web UI + marketing site Vitest suites.
  - "source/web-ui/tests/**"
  - "source/site/tests/**"

  # wardnet-test-agent is a test harness that inspects kernel state
  # (ip rule, nft, wg show, etc.). It is never part of a production
  # deployment and exposes HTTP only on the test LAN.
  - "source/daemon/crates/wardnet-test-agent/**"

# Default query suite is appropriate for us. We don't need to override
# `queries:` here; keep the tuning surface minimal.
