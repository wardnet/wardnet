version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/source/daemon"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    # 3-day cooldown before Dependabot opens a PR for a new version.
    # Gives the wider ecosystem time to surface supply-chain issues
    # (yanked releases, compromised publishers) before an auto-merge
    # eligible PR lands on main.
    cooldown:
      default-days: 3

  - package-ecosystem: "npm"
    directory: "/source/web-ui"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    cooldown:
      default-days: 3

  - package-ecosystem: "npm"
    directory: "/source/site"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    cooldown:
      default-days: 3

  - package-ecosystem: npm
    directory: /source/sdk/wardnet-js
    schedule:
      interval: daily
    cooldown:
      default-days: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci):"
    cooldown:
      default-days: 3

  # Production wardnetd image (source/daemon/Dockerfile) — pinned by
  # digest for Scorecard / supply-chain integrity, so Dependabot is
  # the channel that surfaces base-image updates.
  - package-ecosystem: "docker"
    directory: "/source/daemon"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    cooldown:
      default-days: 3

  # ClusterFuzzLite build image (.clusterfuzzlite/Dockerfile) — same
  # pin-then-bump story.
  - package-ecosystem: "docker"
    directory: "/.clusterfuzzlite"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    cooldown:
      default-days: 3
