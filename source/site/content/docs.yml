# Documentation content for the public site.
# Each entry represents a documentation page. The "recommended" entries
# appear in the highlighted section at the top of the docs page.
# Update this file to change what is shown — no code changes needed.

recommended:
  - slug: installation
    title: Installation
    icon: download
    excerpt: >
      Get Wardnet running on your Raspberry Pi in minutes. Download the
      latest release, configure the daemon, and start protecting your
      network with a single command.

  - slug: device-routing
    title: Device routing
    icon: route
    excerpt: >
      Learn how to assign each device on your network to a specific VPN
      tunnel, direct internet access, or the network default. Routing
      changes take effect immediately — no restarts required.

  - slug: dhcp-server
    title: DHCP server
    icon: network
    excerpt: >
      Enable the built-in DHCP server to automatically discover and manage
      devices as they join your network. No manual IP configuration needed.

