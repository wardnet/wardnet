# Documentation content for the public site.
# Each entry represents a documentation page. The "recommended" entries
# appear in the highlighted section at the top of the docs page.
# Update this file to change what is shown — no code changes needed.

recommended:
  - slug: installation
    title: Installation
    icon: download
    excerpt: >
      Get Wardnet running on your Raspberry Pi in minutes. Download the
      latest release, configure the daemon, and start protecting your
      network with a single command.

  - slug: first-run
    title: First-time setup
    icon: sparkles
    excerpt: >
      After the installer finishes, the web UI walks you through creating
      the admin account and connecting your first tunnel. This guide
      walks you through the setup wizard step by step.

  - slug: configuration
    title: Configuration reference
    icon: settings
    excerpt: >
      Every option in wardnet.toml — database, logging, networking,
      auto-update, observability — with its default and when you would
      want to change it.

