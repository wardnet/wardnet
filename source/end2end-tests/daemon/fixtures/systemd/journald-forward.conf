# Drop-in mounted into /etc/systemd/journald.conf.d/ at runtime.
#
# By default systemd-journald keeps everything inside its own ring
# buffer; the container's stdout is silent and `docker compose logs`
# returns 0 bytes when wardnetd or the unit it's wrapped in fails.
# Forwarding to the console makes journal entries appear on
# /dev/console, which the container runtime maps to PID 1's stdout —
# i.e. exactly what `docker logs` captures.
#
# Test-only knob: noisier logs are fine here; the prod image keeps
# the default and ships journal entries through proper log shipping.
[Journal]
ForwardToConsole=yes
MaxLevelConsole=debug
