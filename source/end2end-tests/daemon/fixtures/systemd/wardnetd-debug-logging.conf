# Drop-in mounted into /etc/systemd/system/wardnetd.service.d/ at runtime.
#
# The daemon's tracing setup only attaches a stderr layer when
# --verbose is passed; otherwise logs go exclusively to the rolling
# file at /var/log/wardnet/wardnetd.log. systemd then routes stderr
# (empty) and stdout (just the println! banner) to journald, so a
# `compose logs` of a failing test run shows nothing useful.
#
# Setting RUST_LOG=debug doesn't fix the missing stderr layer on its
# own, but it ensures everything that DOES reach the file or any
# attached layer is captured. Pair this with the test image's
# --verbose flag (set on ExecStart below) so the stderr layer is
# wired up.
[Service]
Environment="RUST_LOG=info,wardnetd=debug,wardnetd_services=debug,wardnetd_api=debug"
ExecStart=
ExecStart=/usr/local/bin/wardnetd --verbose --config /etc/wardnet/wardnet.toml
